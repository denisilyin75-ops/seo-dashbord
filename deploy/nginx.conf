# ============================================================
# SEO Command Center — nginx config для cmd.bonaka.app
# ============================================================
# Положить как ОТДЕЛЬНЫЙ файл рядом с существующим bonaka.app,
# не перезаписывая его:
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/cmd.bonaka.app
#   sudo ln -s /etc/nginx/sites-available/cmd.bonaka.app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL подключается через certbot:
#   sudo certbot --nginx -d cmd.bonaka.app
# ============================================================

# HTTP → HTTPS редирект (certbot дополнит этот блок)
server {
    listen 80;
    listen [::]:80;
    server_name cmd.bonaka.app;

    # Для первичной проверки ACME от certbot:
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cmd.bonaka.app;

    # SSL (заполнится certbot'ом):
    ssl_certificate     /etc/letsencrypt/live/cmd.bonaka.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cmd.bonaka.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Логи (отдельные от bonaka.app)
    access_log /var/log/nginx/cmd.bonaka.app.access.log;
    error_log  /var/log/nginx/cmd.bonaka.app.error.log warn;

    # Безопасность
    add_header X-Frame-Options          "SAMEORIGIN"         always;
    add_header X-Content-Type-Options   "nosniff"            always;
    add_header Referrer-Policy          "no-referrer"        always;
    add_header Permissions-Policy       "interest-cohort=()" always;

    # Лимиты и сжатие
    client_max_body_size 4M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---- Статика фронтенда (собранная Vite) ----
    root /var/www/seo-command-center/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеш статики (js/css/шрифты/иконки)
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Backend Express через PM2 на 127.0.0.1:3001 ----
    # Порт 3001 выбран чтобы не конфликтовать с Next.js (bonaka.app → :3000)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # AI-команды могут идти долго
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Скрыть служебные файлы
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }
}
