# /etc/nginx/sites-available/seo-command-center
# Symlink в /etc/nginx/sites-enabled/, после: nginx -t && systemctl reload nginx
# SSL подключается через certbot --nginx -d cmd.popolkam.ru

server {
    listen 80;
    listen [::]:80;
    server_name cmd.popolkam.ru;

    # Редирект на HTTPS — добавится автоматически после certbot,
    # но если нужно вручную:
    # return 301 https://$host$request_uri;

    # До получения SSL — обслуживаем напрямую (закомментировать после certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cmd.popolkam.ru;

    # SSL — заполнится certbot'ом
    ssl_certificate     /etc/letsencrypt/live/cmd.popolkam.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cmd.popolkam.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Логи
    access_log /var/log/nginx/scc.access.log;
    error_log  /var/log/nginx/scc.error.log warn;

    # Безопасность
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header Referrer-Policy          "no-referrer"     always;
    add_header Permissions-Policy       "interest-cohort=()" always;
    # CSP отключён по умолчанию — recharts, шрифты Google и т.п.
    # add_header Content-Security-Policy "default-src 'self'" always;

    # Лимиты
    client_max_body_size 4M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---- Frontend (статика, собранная Vite) ----
    root /var/www/seo-command-center/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеш статики
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Backend (Express через PM2 на 3001) ----
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Долгие AI запросы могут идти > 30s
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Запретить доступ к скрытым файлам / git
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }
}
