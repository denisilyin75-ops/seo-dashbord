<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Aykakchisto.ru — обзоры бытовой химии без воды">
  <defs>
    <linearGradient id="ayOHbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1e36"/>
    </linearGradient>
    <linearGradient id="ayOHcard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f4f6f8"/>
    </linearGradient>
    <linearGradient id="ayOHdrop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="ayOHhighlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ayOHbg)"/>

  <g fill="#e8a04c" opacity="0.18">
    <ellipse cx="120" cy="100" rx="14" ry="20" transform="rotate(-22 120 100)"/>
    <ellipse cx="1080" cy="540" rx="12" ry="18" transform="rotate(28 1080 540)"/>
    <ellipse cx="980" cy="80" rx="10" ry="14" transform="rotate(15 980 80)"/>
    <ellipse cx="80" cy="510" rx="10" ry="14" transform="rotate(-12 80 510)"/>
  </g>

  <g transform="translate(60 80)" filter="drop-shadow(0 12px 28px rgba(0,0,0,0.4))">
    <rect width="1080" height="470" rx="24" fill="url(#ayOHcard)"/>

    <g transform="translate(60 70)">
      <rect width="56" height="56" rx="14" fill="url(#ayOHbg)"/>
      <text x="28" y="36" font-family="DM Sans,sans-serif" font-size="26" font-weight="800" fill="#e8a04c" text-anchor="middle">A</text>
      <text x="78" y="36" font-family="DM Sans,system-ui,sans-serif" font-size="24" font-weight="800" fill="#1e3a5f">aykakchisto<tspan fill="#e8a04c">.ru</tspan></text>
    </g>

    <text x="60" y="240" font-family="DM Sans,system-ui,sans-serif" font-size="62" font-weight="800" fill="#1e3a5f">Чище без нервов</text>
    <text x="60" y="306" font-family="DM Sans,system-ui,sans-serif" font-size="62" font-weight="800" fill="#1e3a5f">и без вреда —</text>
    <text x="60" y="372" font-family="DM Sans,system-ui,sans-serif" font-size="62" font-weight="800" fill="#e8a04c">с замерами</text>

    <g transform="translate(60 405)">
      <text font-family="DM Sans,system-ui,sans-serif" font-size="18" font-weight="600" fill="#475569">pH-замеры · 3 цикла теста · 16 лет лаборатории</text>
    </g>

    <g transform="translate(820 230)">
      <ellipse cx="0" cy="160" rx="80" ry="10" fill="#000" fill-opacity="0.12"/>
      <path d="M 0,30 Q -50,90 -70,150 Q -76,200 0,210 Q 76,200 70,150 Q 50,90 0,30 Z" fill="url(#ayOHdrop)" stroke="#0c4a6e" stroke-width="2"/>
      <path d="M 0,30 Q -50,90 -70,150 Q -76,200 0,210 Q 76,200 70,150 Q 50,90 0,30 Z" fill="url(#ayOHhighlight)"/>
      <ellipse cx="-22" cy="105" rx="12" ry="22" fill="#fff" fill-opacity="0.55"/>

      <ellipse cx="-18" cy="135" rx="10" ry="10" fill="#fff" stroke="#0c4a6e" stroke-width="1.5"/>
      <circle cx="-18" cy="135" r="6" fill="#1e3a5f"/>
      <circle cx="-18" cy="134" r="3" fill="#e8a04c"/>
      <ellipse cx="22" cy="135" rx="10" ry="10" fill="#fff" stroke="#0c4a6e" stroke-width="1.5"/>
      <circle cx="22" cy="135" r="6" fill="#1e3a5f"/>
      <circle cx="22" cy="134" r="3" fill="#e8a04c"/>

      <path d="M -16,170 Q 0,184 16,170" stroke="#0c4a6e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <g transform="translate(60 580)">
    <rect width="280" height="34" rx="17" fill="#fff"/>
    <text x="140" y="22" font-family="DM Sans,system-ui,sans-serif" font-size="13" font-weight="800" fill="#e8a04c" text-anchor="middle" letter-spacing="0.5">Химия · уборка · стирка · пылесосы</text>
  </g>
  <g transform="translate(960 580)">
    <rect width="180" height="34" rx="17" fill="#0f1e36"/>
    <text x="90" y="22" font-family="DM Sans,system-ui,sans-serif" font-size="13" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.5">aykakchisto.ru</text>
  </g>
