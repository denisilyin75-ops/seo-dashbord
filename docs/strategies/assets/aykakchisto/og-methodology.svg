<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Aykakchisto — как мы тестируем химию">
  <defs>
    <linearGradient id="ayOMbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1e36"/>
    </linearGradient>
    <linearGradient id="ayOMcard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f4f6f8"/>
    </linearGradient>
    <linearGradient id="ayOMpHstrip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="20%" stop-color="#f97316"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#84cc16"/>
      <stop offset="80%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="ayOMgrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e8a04c" stroke-width="0.6" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#ayOMbg)"/>
  <rect width="1200" height="630" fill="url(#ayOMgrid)"/>

  <g transform="translate(60 80)" filter="drop-shadow(0 12px 28px rgba(0,0,0,0.4))">
    <rect width="1080" height="470" rx="24" fill="url(#ayOMcard)"/>

    <g transform="translate(60 70)">
      <rect width="56" height="56" rx="14" fill="url(#ayOMbg)"/>
      <text x="28" y="36" font-family="DM Sans,sans-serif" font-size="26" font-weight="800" fill="#e8a04c" text-anchor="middle">A</text>
      <text x="78" y="36" font-family="DM Sans,system-ui,sans-serif" font-size="22" font-weight="800" fill="#1e3a5f">aykakchisto<tspan fill="#e8a04c">.ru</tspan></text>
    </g>

    <g transform="translate(60 200)" font-family="DM Sans,system-ui,sans-serif">
      <text font-size="20" font-weight="700" fill="#92400e" letter-spacing="2">МЕТОДОЛОГИЯ</text>
      <text y="80" font-size="68" font-weight="800" fill="#1e3a5f">Как мы тестируем</text>
      <text y="138" font-size="22" font-weight="600" fill="#475569">Каждое средство — через 3 цикла стенда</text>
    </g>

    <g transform="translate(60 380)">
      <g transform="translate(0 0)">
        <rect width="120" height="48" rx="8" fill="#1e3a5f"/>
        <text x="60" y="20" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">pH 7.2</text>
        <text x="60" y="36" font-family="DM Sans,sans-serif" font-size="9" font-weight="600" fill="#cbd5e1" text-anchor="middle">после стирки</text>
      </g>
      <g transform="translate(140 0)">
        <rect width="120" height="48" rx="8" fill="#1e3a5f"/>
        <text x="60" y="20" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">22°C</text>
        <text x="60" y="36" font-family="DM Sans,sans-serif" font-size="9" font-weight="600" fill="#cbd5e1" text-anchor="middle">температура</text>
      </g>
      <g transform="translate(280 0)">
        <rect width="120" height="48" rx="8" fill="#1e3a5f"/>
        <text x="60" y="20" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">3 ЦИКЛА</text>
        <text x="60" y="36" font-family="DM Sans,sans-serif" font-size="9" font-weight="600" fill="#cbd5e1" text-anchor="middle">стирка-сушка</text>
      </g>
      <g transform="translate(420 0)">
        <rect width="120" height="48" rx="8" fill="#1e3a5f"/>
        <text x="60" y="20" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">270 g/m²</text>
        <text x="60" y="36" font-family="DM Sans,sans-serif" font-size="9" font-weight="600" fill="#cbd5e1" text-anchor="middle">микрофибра</text>
      </g>
    </g>

    <g transform="translate(700 130)" filter="drop-shadow(0 6px 14px rgba(0,0,0,0.12))">
      <rect width="120" height="170" rx="14" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="14" y="14" width="92" height="14" rx="3" fill="#1e3a5f"/>
      <text x="60" y="25" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">pH METER</text>
      <rect x="14" y="34" width="92" height="68" rx="6" fill="#1e3a5f"/>
      <rect x="14" y="34" width="92" height="68" rx="6" fill="#fbbf24" opacity="0.12"/>
      <text x="60" y="72" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="32" font-weight="700" fill="#fbbf24" text-anchor="middle">7.2</text>
      <text x="60" y="92" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" opacity="0.85">pH ± 0.05</text>
      <rect x="22" y="116" width="76" height="40" rx="3" fill="url(#ayOMpHstrip)"/>
      <line x1="68" y1="112" x2="68" y2="160" stroke="#0f1e36" stroke-width="2"/>
    </g>

    <g transform="translate(870 100)" filter="drop-shadow(0 6px 14px rgba(0,0,0,0.12))">
      <ellipse cx="60" cy="216" rx="68" ry="8" fill="#000" fill-opacity="0.10"/>
      <rect x="20" y="50" width="44" height="170" rx="8" fill="#fff" stroke="#1e3a5f" stroke-width="1.5"/>
      <rect x="14" y="58" width="56" height="22" rx="3" fill="#0ea5e9"/>
      <text x="42" y="72" font-family="DM Sans,sans-serif" font-size="10" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.5">CLEAN</text>
      <rect x="18" y="92" width="48" height="120" rx="2" fill="#7dd3fc" opacity="0.55"/>
      <rect x="34" y="40" width="16" height="14" fill="#1e3a5f"/>
      <path d="M 38,40 L 38,18 L 70,18 L 70,30 L 50,30 L 50,40 Z" fill="#1e3a5f"/>
      <rect x="64" y="18" width="14" height="14" rx="3" fill="#e8a04c"/>
    </g>
  </g>

  <g transform="translate(60 580)">
    <rect width="280" height="34" rx="17" fill="#fff"/>
    <text x="140" y="22" font-family="DM Sans,system-ui,sans-serif" font-size="13" font-weight="800" fill="#e8a04c" text-anchor="middle" letter-spacing="0.5">7 этапов · 4 категории оценок</text>
  </g>
  <g transform="translate(960 580)">
    <rect width="180" height="34" rx="17" fill="#0f1e36"/>
    <text x="90" y="22" font-family="DM Sans,system-ui,sans-serif" font-size="13" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.5">aykakchisto.ru</text>
  </g>
</svg>
