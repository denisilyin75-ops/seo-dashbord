<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Лабораторная методология Aykakchisto: спектрометр, проба, pH-метр, микрофибра, секундомер">
  <defs>
    <radialGradient id="ayMspot" cx="50%" cy="44%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ayMdevice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a6f"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="ayMpHstrip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="20%" stop-color="#f97316"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#84cc16"/>
      <stop offset="80%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ayMfiber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="ayMtube" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <pattern id="ayMgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.18"/>
    </pattern>
    <filter id="ayMshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="6" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#f4f6f8"/>
  <rect width="1200" height="500" fill="url(#ayMspot)"/>

  <g transform="rotate(-2 600 250)">
    <rect x="240" y="100" width="720" height="320" fill="#fff" filter="url(#ayMshadow)"/>
    <rect x="240" y="100" width="720" height="320" fill="url(#ayMgrid)"/>
    <polyline points="280,360 340,330 400,340 460,300 520,310 580,260 640,290 700,240 760,260 820,220 880,235 940,210" fill="none" stroke="#e8a04c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#e8a04c">
      <circle cx="280" cy="360" r="3"/>
      <circle cx="400" cy="340" r="3"/>
      <circle cx="520" cy="310" r="3"/>
      <circle cx="640" cy="290" r="3"/>
      <circle cx="760" cy="260" r="3"/>
      <circle cx="880" cy="235" r="3"/>
    </g>
    <text x="270" y="130" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#1e3a5f" opacity="0.7">Удалено загрязнения, %</text>
  </g>

  <path d="M 0,400 L 1200,380 L 1200,500 L 0,500 Z" fill="#1e3a5f"/>
  <path d="M 0,400 L 1200,380 L 1200,402 L 0,422 Z" fill="#2a4a6f"/>

  <g transform="translate(80 290)" filter="url(#ayMshadow)">
    <rect width="180" height="130" rx="10" fill="url(#ayMdevice)"/>
    <rect x="14" y="14" width="152" height="64" rx="4" fill="#0a0e17"/>
    <rect x="14" y="14" width="152" height="64" rx="4" fill="#86efac" opacity="0.18"/>
    <text x="160" y="42" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" font-weight="700" fill="#86efac" text-anchor="end">0.32</text>
    <text x="160" y="58" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" font-weight="600" fill="#22c55e" text-anchor="end" opacity="0.75">OD₅₈₀</text>
    <text x="20" y="72" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="8" fill="#22c55e" opacity="0.7">·--·-· READING</text>
    <circle cx="32" cy="98" r="6" fill="#e8a04c"/>
    <circle cx="56" cy="98" r="6" fill="#1e3a5f" stroke="#475569" stroke-width="1.5"/>
    <rect x="78" y="92" width="80" height="14" rx="2" fill="#0a0e17"/>
    <text x="118" y="103" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#cbd5e1" text-anchor="middle">SPECTROPHOTOMETER</text>
  </g>

  <g transform="translate(330 270)" filter="url(#ayMshadow)">
    <ellipse cx="32" cy="160" rx="40" ry="6" fill="#000" fill-opacity="0.18"/>
    <path d="M 14,40 L 14,150 Q 14,160 32,160 Q 50,160 50,150 L 50,40 Z" fill="url(#ayMtube)" fill-opacity="0.65" stroke="#0c4a6e" stroke-width="1.5"/>
    <ellipse cx="32" cy="40" rx="18" ry="5" fill="#bae6fd" stroke="#0c4a6e" stroke-width="1.5"/>
    <rect x="10" y="18" width="44" height="22" rx="3" fill="#fff" stroke="#0c4a6e" stroke-width="1.5"/>
    <text x="32" y="33" font-family="DM Sans,sans-serif" font-size="9" font-weight="800" fill="#0c4a6e" text-anchor="middle">SAMPLE</text>
    <ellipse cx="32" cy="92" rx="12" ry="3" fill="#fff" opacity="0.45"/>
    <text x="80" y="80" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#1e3a5f">тест-образец</text>
    <text x="80" y="98" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" font-weight="600" fill="#475569">пятно — 24 ч</text>
    <text x="80" y="116" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" font-weight="600" fill="#475569">3 цикла стирки</text>
  </g>

  <g transform="translate(560 280)" filter="url(#ayMshadow)">
    <rect width="120" height="170" rx="14" fill="#fff"/>
    <rect x="0" y="0" width="120" height="170" rx="14" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="14" y="14" width="92" height="14" rx="3" fill="#1e3a5f"/>
    <text x="60" y="25" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">pH METER</text>
    <rect x="14" y="34" width="92" height="68" rx="6" fill="url(#ayMdevice)"/>
    <rect x="14" y="34" width="92" height="68" rx="6" fill="#fbbf24" opacity="0.12"/>
    <text x="60" y="72" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="32" font-weight="700" fill="#fbbf24" text-anchor="middle">7.2</text>
    <text x="60" y="92" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" opacity="0.85">pH ± 0.05</text>
    <rect x="22" y="116" width="76" height="40" rx="3" fill="url(#ayMpHstrip)"/>
    <line x1="68" y1="112" x2="68" y2="160" stroke="#0f1e36" stroke-width="2"/>
    <text x="60" y="170" font-family="DM Sans,sans-serif" font-size="8" font-weight="700" fill="#475569" text-anchor="middle">NEUTRAL</text>
  </g>

  <g transform="translate(750 320)" filter="url(#ayMshadow)">
    <ellipse cx="80" cy="100" rx="80" ry="6" fill="#000" fill-opacity="0.18"/>
    <path d="M 0,40 L 160,40 Q 175,48 173,70 L -13,70 Q -10,48 0,40 Z" fill="url(#ayMfiber)" stroke="#ca8a04" stroke-width="1.2"/>
    <g stroke="#fff" stroke-width="0.8" opacity="0.55">
      <line x1="10" y1="46" x2="10" y2="68"/>
      <line x1="30" y1="42" x2="32" y2="68"/>
      <line x1="50" y1="42" x2="52" y2="68"/>
      <line x1="70" y1="42" x2="72" y2="68"/>
      <line x1="90" y1="42" x2="92" y2="68"/>
      <line x1="110" y1="42" x2="112" y2="68"/>
      <line x1="130" y1="42" x2="132" y2="68"/>
      <line x1="150" y1="42" x2="152" y2="68"/>
      <line x1="-3" y1="54" x2="170" y2="54"/>
    </g>
    <text x="80" y="62" font-family="DM Sans,sans-serif" font-size="11" font-weight="800" fill="#0f1e36" text-anchor="middle" letter-spacing="0.8">МИКРОФИБРА · 270 g/m²</text>
    <text x="80" y="20" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#1e3a5f" text-anchor="middle">↓ ткань-эталон</text>
  </g>

  <g transform="translate(1020 290)" filter="url(#ayMshadow)">
    <rect x="60" y="-12" width="20" height="14" rx="2" fill="#1e3a5f"/>
    <rect x="64" y="-22" width="12" height="12" rx="2" fill="#1e3a5f"/>
    <circle cx="70" cy="80" r="76" fill="#fff"/>
    <circle cx="70" cy="80" r="76" fill="none" stroke="#1e3a5f" stroke-width="3"/>
    <circle cx="70" cy="80" r="68" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <g stroke="#1e3a5f" stroke-width="2" stroke-linecap="round">
      <line x1="70" y1="14" x2="70" y2="22"/>
      <line x1="136" y1="80" x2="128" y2="80"/>
      <line x1="70" y1="146" x2="70" y2="138"/>
      <line x1="4" y1="80" x2="12" y2="80"/>
    </g>
    <text x="70" y="55" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#475569" text-anchor="middle">CYCLE TIME</text>
    <line x1="70" y1="80" x2="70" y2="22" stroke="#e8a04c" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="80" x2="115" y2="105" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="70" cy="80" r="6" fill="#e8a04c"/>
    <circle cx="70" cy="80" r="3" fill="#1e3a5f"/>
    <text x="70" y="125" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" font-weight="700" fill="#1e3a5f" text-anchor="middle">10:00.0</text>
  </g>

  <g transform="translate(40 60)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="220" height="36" rx="18" fill="#1e3a5f"/>
    <text x="20" y="23" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.2">МЕТОДОЛОГИЯ</text>
    <circle cx="200" cy="18" r="10" fill="#e8a04c"/>
    <text x="200" y="22" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  </g>
</svg>
