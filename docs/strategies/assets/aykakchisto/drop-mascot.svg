<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 460" width="360" height="460" role="img" aria-label="Дроп — антропоморфная капля воды, маскот Aykakchisto.ru">
  <defs>
    <radialGradient id="drBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="80%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="drBodyEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <radialGradient id="drHighlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drBottle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="drSpray" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="drShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="360" height="460" fill="#f4f6f8"/>
  <rect width="360" height="460" fill="url(#drBg)"/>

  <ellipse cx="180" cy="430" rx="100" ry="14" fill="#000" fill-opacity="0.16"/>

  <g opacity="0.35">
