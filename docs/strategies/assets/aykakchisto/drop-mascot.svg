    <ellipse cx="305" cy="100" rx="5" ry="7" fill="#38bdf8"/>
    <ellipse cx="320" cy="350" rx="6" ry="8" fill="#7dd3fc"/>
    <ellipse cx="40" cy="380" rx="5" ry="7" fill="#38bdf8"/>
  </g>

  <g filter="url(#drShadow)">
    <path d="M 180,90 Q 130,160 110,260 Q 100,360 180,390 Q 260,360 250,260 Q 230,160 180,90 Z" fill="url(#drBody)" stroke="url(#drBodyEdge)" stroke-width="2"/>
    <path d="M 180,90 Q 130,160 110,260 Q 100,360 180,390 Q 260,360 250,260 Q 230,160 180,90 Z" fill="url(#drHighlight)"/>

    <ellipse cx="146" cy="220" rx="14" ry="14" fill="#fff" stroke="#0c4a6e" stroke-width="2"/>
    <circle cx="148" cy="222" r="9" fill="#1e3a5f"/>
    <circle cx="148" cy="220" r="6" fill="#e8a04c"/>
    <circle cx="150" cy="218" r="3" fill="#fff"/>
    <circle cx="146" cy="225" r="1.5" fill="#fff" opacity="0.85"/>

    <ellipse cx="214" cy="220" rx="14" ry="14" fill="#fff" stroke="#0c4a6e" stroke-width="2"/>
    <circle cx="216" cy="222" r="9" fill="#1e3a5f"/>
    <circle cx="216" cy="220" r="6" fill="#e8a04c"/>
    <circle cx="218" cy="218" r="3" fill="#fff"/>
    <circle cx="214" cy="225" r="1.5" fill="#fff" opacity="0.85"/>

    <path d="M 130,210 Q 138,200 152,206" stroke="#0c4a6e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 208,206 Q 222,200 230,210" stroke="#0c4a6e" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <path d="M 152,272 Q 180,294 208,272 Q 200,300 180,300 Q 160,300 152,272 Z" fill="#0c4a6e"/>
    <path d="M 168,290 Q 180,302 192,290" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M 174,290 Q 178,300 184,290 L 184,294 Q 180,300 174,294 Z" fill="#e8a04c"/>

    <ellipse cx="125" cy="252" rx="10" ry="6" fill="#fda4af" opacity="0.55"/>
    <ellipse cx="235" cy="252" rx="10" ry="6" fill="#fda4af" opacity="0.55"/>

    <ellipse cx="170" cy="160" rx="22" ry="36" fill="url(#drHighlight)" opacity="0.85"/>
  </g>

  <g transform="translate(86 280)" filter="url(#drShadow)">
