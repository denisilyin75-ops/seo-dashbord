    <ellipse cx="-3" cy="-2" rx="8" ry="4" fill="url(#drHighlight)" opacity="0.6"/>
  </g>
  <g transform="translate(240 380)" filter="url(#drShadow)">
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="url(#drBody)" stroke="url(#drBodyEdge)" stroke-width="1.5"/>
    <ellipse cx="-3" cy="-2" rx="8" ry="4" fill="url(#drHighlight)" opacity="0.6"/>
  </g>

  <g transform="translate(80 60)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="120" height="30" rx="6" fill="#fff" stroke="#bae6fd" stroke-width="2"/>
    <text x="60" y="14" font-size="9" font-weight="800" fill="#0369a1" text-anchor="middle" letter-spacing="0.5">ВСЁ ЧИСТО</text>
    <text x="60" y="25" font-size="9" font-weight="700" fill="#475569" text-anchor="middle">pH 7.2 · 22°C</text>
    <path d="M 110,30 L 120,40 L 108,38 Z" fill="#fff" stroke="#bae6fd" stroke-width="2"/>
  </g>

  <g transform="translate(150 100)" opacity="0.55">
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#0ea5e9" stroke-width="1.5"/>
    <line x1="-6" y1="-2" x2="-12" y2="-8" stroke="#0ea5e9" stroke-width="1.5"/>
    <line x1="6" y1="-2" x2="12" y2="-8" stroke="#0ea5e9" stroke-width="1.5"/>
    <circle cx="-6" cy="-12" r="2" fill="#7dd3fc"/>
