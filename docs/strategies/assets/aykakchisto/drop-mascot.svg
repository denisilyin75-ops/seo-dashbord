      <rect x="-8" y="-32" width="14" height="6" rx="2" fill="#0c4a6e"/>
      <path d="M -1,-32 L -1,-44 L 16,-44 L 16,-38 L 4,-38 L 4,-32 Z" fill="#0c4a6e"/>
      <rect x="14" y="-44" width="6" height="6" rx="2" fill="#e8a04c"/>
      <rect x="-10" y="-22" width="18" height="14" rx="2" fill="#7dd3fc" opacity="0.7"/>
      <text x="-1" y="-12" font-family="DM Sans,sans-serif" font-size="6" font-weight="800" fill="#0c4a6e" text-anchor="middle">CLEAN</text>
      <g stroke="url(#drSpray)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
        <path d="M 22,-40 Q 32,-44 42,-46"/>
        <path d="M 22,-38 Q 32,-38 44,-36"/>
        <path d="M 22,-36 Q 32,-32 42,-28"/>
      </g>
      <circle cx="38" cy="-44" r="2" fill="#7dd3fc"/>
      <circle cx="42" cy="-32" r="1.5" fill="#7dd3fc"/>
    </g>
  </g>

  <g transform="translate(120 380)" filter="url(#drShadow)">
