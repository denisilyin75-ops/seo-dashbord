<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Прозрачность партнёрских ссылок Aykakchisto: rel sponsored, 3 магазина, цена не меняется">
  <defs>
    <radialGradient id="ayTspot" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ayTcode" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a6f"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="ayTbag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="ayTdrop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="ayTshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#f4f6f8"/>
  <rect width="1200" height="500" fill="url(#ayTspot)"/>

  <g fill="#1e3a5f" font-family="ui-monospace,Menlo,Consolas,monospace" font-weight="600" opacity="0.16">
    <text x="60" y="60" font-size="42">&lt;/&gt;</text>
    <text x="980" y="80" font-size="34">{ }</text>
    <text x="100" y="430" font-size="28">→ link</text>
    <text x="1020" y="460" font-size="32">&lt;a&gt;</text>
    <text x="540" y="40" font-size="22">rel=</text>
  </g>

  <g transform="translate(40 36)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="240" height="36" rx="18" fill="#1e3a5f"/>
    <text x="20" y="23" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.2">ПРОЗРАЧНОСТЬ</text>
    <circle cx="220" cy="18" r="9" fill="#22c55e"/>
    <path d="M 215,18 L 219,22 L 225,15" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <g transform="translate(280 130)" filter="url(#ayTshadow)">
    <rect width="640" height="190" rx="14" fill="url(#ayTcode)"/>
    <rect x="0" y="0" width="640" height="40" rx="14" fill="#0a0e17"/>
    <rect x="0" y="28" width="640" height="14" fill="#0a0e17"/>
    <g transform="translate(16 20)">
      <circle cx="0" cy="0" r="6" fill="#ef4444"/>
      <circle cx="20" cy="0" r="6" fill="#fbbf24"/>
      <circle cx="40" cy="0" r="6" fill="#22c55e"/>
    </g>
    <text x="320" y="25" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">aykakchisto.ru — обзор средства</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="20" font-weight="500">
      <text x="32" y="84" fill="#94a3b8">&lt;</text>
      <text x="46" y="84" fill="#f87171">a</text>
      <text x="68" y="84" fill="#cbd5e1">href=</text>
      <text x="135" y="84" fill="#86efac">&quot;...&quot;</text>
      <text x="200" y="84" fill="#94a3b8">&gt;</text>
      <text x="64" y="116" fill="#fbbf24" font-weight="700">rel</text>
      <text x="100" y="116" fill="#cbd5e1">=</text>
      <text x="116" y="116" fill="#e8a04c" font-weight="700">&quot;sponsored&quot;</text>
      <line x1="116" y1="124" x2="246" y2="124" stroke="#e8a04c" stroke-width="2" stroke-linecap="round"/>
      <text x="64" y="148" fill="#94a3b8">target=</text>
      <text x="160" y="148" fill="#86efac">&quot;_blank&quot;</text>
      <text x="32" y="174" fill="#94a3b8">  Цена на Маркете →</text>
    </g>
    <g transform="translate(560 50)">
      <rect width="60" height="22" rx="11" fill="#e8a04c"/>
      <text x="30" y="15" font-family="DM Sans,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">SEO ✓</text>
    </g>
  </g>

  <g transform="translate(80 290)" filter="url(#ayTshadow)">
    <ellipse cx="60" cy="148" rx="56" ry="9" fill="#000" fill-opacity="0.16"/>
    <path d="M 60,30 Q 28,80 18,120 Q 12,160 60,170 Q 108,160 102,120 Q 92,80 60,30 Z" fill="url(#ayTdrop)" stroke="#0c4a6e" stroke-width="2"/>
    <ellipse cx="42" cy="92" rx="8" ry="14" fill="#fff" fill-opacity="0.55"/>
    <ellipse cx="44" cy="116" rx="6" ry="6" fill="#fff" stroke="#0c4a6e" stroke-width="1.5"/>
    <circle cx="44" cy="116" r="3" fill="#1e3a5f"/>
    <ellipse cx="76" cy="116" rx="6" ry="6" fill="#fff" stroke="#0c4a6e" stroke-width="1.5"/>
    <circle cx="76" cy="116" r="3" fill="#1e3a5f"/>
    <path d="M 50,138 Q 60,144 70,138" stroke="#0c4a6e" stroke-width="2" stroke-linecap="round" fill="none"/>
    <text x="60" y="190" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#1e3a5f" text-anchor="middle">ВЫ</text>
  </g>

  <g stroke="#e8a04c" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round">
    <path d="M 200,330 Q 280,290 340,250"/>
  </g>
  <g transform="translate(220 308)">
    <circle cx="0" cy="0" r="14" fill="#fff" stroke="#e8a04c" stroke-width="2"/>
    <text x="0" y="4" font-family="DM Sans,sans-serif" font-size="11" font-weight="800" fill="#e8a04c" text-anchor="middle">→</text>
  </g>

  <g stroke="#e8a04c" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round">
    <path d="M 920,250 Q 990,290 1040,330"/>
  </g>

  <g transform="translate(900 350)">
    <g transform="translate(0 0)">
      <rect width="80" height="100" rx="6" fill="url(#ayTbag)" stroke="#cbd5e1" stroke-width="1.5"/>
      <path d="M 22,8 Q 22,-12 40,-12 Q 58,-12 58,8" stroke="#1e3a5f" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="58" font-family="DM Sans,sans-serif" font-size="22" font-weight="800" fill="#1e3a5f" text-anchor="middle">М</text>
      <text x="40" y="78" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">МАРКЕТ</text>
    </g>
    <g transform="translate(96 0)">
      <rect width="80" height="100" rx="6" fill="url(#ayTbag)" stroke="#cbd5e1" stroke-width="1.5"/>
      <path d="M 22,8 Q 22,-12 40,-12 Q 58,-12 58,8" stroke="#1e3a5f" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="58" font-family="DM Sans,sans-serif" font-size="22" font-weight="800" fill="#1e3a5f" text-anchor="middle">О</text>
      <text x="40" y="78" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">ОЗОН</text>
    </g>
    <g transform="translate(192 0)">
      <rect width="80" height="100" rx="6" fill="url(#ayTbag)" stroke="#cbd5e1" stroke-width="1.5"/>
      <path d="M 22,8 Q 22,-12 40,-12 Q 58,-12 58,8" stroke="#1e3a5f" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="58" font-family="DM Sans,sans-serif" font-size="22" font-weight="800" fill="#1e3a5f" text-anchor="middle">W</text>
      <text x="40" y="78" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">WB</text>
    </g>
  </g>

  <g transform="translate(60 460)">
    <rect width="220" height="32" rx="16" fill="#1e3a5f"/>
    <text x="110" y="20" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Каждая ссылка с rel=&quot;sponsored&quot;</text>
  </g>
  <g transform="translate(880 460)">
    <rect width="280" height="32" rx="16" fill="#fff7ed" stroke="#e8a04c" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="140" y="20" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#c2410c" text-anchor="middle">Магазин платит нам 1-3% — цена та же</text>
  </g>
</svg>
