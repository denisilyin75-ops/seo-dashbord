<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420" role="img" aria-label="Бегун в движении: силуэт + замеры кроссовка (вес, drop, stack, каденс)">
  <defs>
    <radialGradient id="brHspot" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brHbg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ecfccb" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ecfccb" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="brHlime" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <linearGradient id="brHbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brHmotion" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </linearGradient>
    <filter id="brHshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="6" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="420" fill="#fafafa"/>
  <rect width="600" height="420" fill="url(#brHspot)"/>
  <rect width="600" height="420" fill="url(#brHbg)"/>

  <g opacity="0.5">
    <circle cx="500" cy="80" r="46" fill="#fef9c3"/>
    <circle cx="500" cy="80" r="38" fill="#fde68a" opacity="0.6"/>
    <circle cx="500" cy="80" r="28" fill="#fcd34d" opacity="0.4"/>
  </g>

  <path d="M 0,360 L 600,340 L 600,420 L 0,420 Z" fill="#0f172a"/>
  <path d="M 0,360 L 600,340 L 600,365 L 0,385 Z" fill="#1e293b"/>

  <g stroke="#84cc16" stroke-width="2" stroke-dasharray="20,8" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M 0,378 L 600,358"/>
  </g>
  <g stroke="#fff" stroke-width="1" stroke-dasharray="20,8" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M 0,396 L 600,376"/>
  </g>
  <g stroke="#84cc16" stroke-width="1" stroke-dasharray="6,6" stroke-linecap="round" fill="none" opacity="0.35">
    <path d="M 0,408 L 600,388"/>
  </g>

  <g stroke="url(#brHmotion)" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 60,200 L 130,200" opacity="0.85"/>
    <path d="M 70,220 L 140,220" opacity="0.65"/>
    <path d="M 80,240 L 150,240" opacity="0.5"/>
    <path d="M 50,180 L 120,180" opacity="0.4"/>
  </g>

  <g transform="translate(160 130)" filter="url(#brHshadow)">
    <ellipse cx="80" cy="240" rx="70" ry="9" fill="#000" fill-opacity="0.18"/>

    <ellipse cx="100" cy="40" rx="22" ry="26" fill="url(#brHbody)"/>

    <rect x="78" y="36" width="42" height="10" rx="5" fill="url(#brHlime)"/>
    <text x="99" y="44" font-family="DM Sans,sans-serif" font-size="6" font-weight="800" fill="#0f172a" text-anchor="middle">4BEG</text>

    <circle cx="113" cy="40" r="2" fill="#fff" opacity="0.85"/>

    <path d="M 88,68 Q 76,90 70,130 Q 68,170 80,210 L 110,210 Q 122,170 120,130 Q 116,90 110,68 Z" fill="url(#brHbody)"/>
    <rect x="84" y="76" width="32" height="60" rx="8" fill="#1e293b"/>
    <line x1="84" y1="92" x2="116" y2="92" stroke="#0a0e17" stroke-width="1" opacity="0.6"/>
    <line x1="84" y1="108" x2="116" y2="108" stroke="#0a0e17" stroke-width="1" opacity="0.6"/>

    <path d="M 78,80 Q 50,90 40,130 Q 38,150 56,160 L 64,140 Q 64,120 70,100 Z" fill="url(#brHbody)"/>
    <ellipse cx="48" cy="160" rx="12" ry="12" fill="#0f172a"/>
    <rect x="36" y="156" width="28" height="6" rx="3" fill="url(#brHlime)"/>
    <rect x="36" y="156" width="28" height="6" rx="3" fill="url(#brHlime)" opacity="0.9"/>

    <rect x="40" y="142" width="14" height="10" rx="2" fill="#fff"/>
    <circle cx="47" cy="147" r="2" fill="#0f172a"/>
    <line x1="40" y1="138" x2="56" y2="138" stroke="#0f172a" stroke-width="1.5"/>

    <path d="M 122,80 Q 154,108 158,150 Q 158,170 144,180 L 134,164 Q 138,140 132,116 Z" fill="url(#brHbody)"/>
    <path d="M 144,180 Q 160,170 168,154" stroke="#0f172a" stroke-width="1" fill="none" opacity="0.4"/>

    <path d="M 80,210 Q 70,250 50,280 L 36,290 L 60,295 Q 84,280 96,240 Z" fill="url(#brHbody)"/>
    <path d="M 36,290 L 28,294 L 24,300 L 70,302 L 70,294 Z" fill="#020617"/>
    <rect x="24" y="288" width="46" height="6" rx="2" fill="url(#brHlime)"/>
    <line x1="32" y1="294" x2="62" y2="294" stroke="#0a0e17" stroke-width="0.8" opacity="0.6"/>

    <path d="M 110,210 Q 130,240 156,260 L 168,254 L 196,250 Q 184,238 172,232 Z" fill="url(#brHbody)"/>
    <path d="M 168,254 L 196,250 L 200,244 L 156,242 Z" fill="#020617"/>
    <rect x="156" y="240" width="44" height="5" rx="2" fill="url(#brHlime)"/>
    <path d="M 156,240 Q 174,246 196,240" stroke="#0a0e17" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <g transform="translate(390 200)" filter="url(#brHshadow)">
    <rect x="-20" y="-30" width="40" height="60" fill="#fff" stroke="#cbd5e1" stroke-width="1" transform="rotate(8 0 0)"/>
    <rect x="-20" y="-30" width="6" height="60" fill="url(#brHlime)" transform="rotate(8 0 0)"/>
    <g transform="rotate(8 0 0)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="8" font-weight="600" fill="#0f172a">
      <text x="-10" y="-18">215 г</text>
      <text x="-10" y="-6">8 мм drop</text>
      <text x="-10" y="6">32 мм stack</text>
      <text x="-10" y="18">180 spm</text>
    </g>
  </g>

  <g transform="translate(40 60)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="180" height="36" rx="18" fill="#0f172a"/>
    <text x="20" y="23" font-size="13" font-weight="800" fill="#fff" letter-spacing="0.8">5 КМ ТЕСТ</text>
    <circle cx="160" cy="18" r="10" fill="url(#brHlime)"/>
    <path d="M 156,17 L 159,21 L 165,14" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <g transform="translate(490 360)" font-family="DM Sans,system-ui,sans-serif">
    <circle cx="0" cy="0" r="42" fill="#0f172a"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#84cc16" stroke-width="2"/>
    <text x="0" y="-5" font-size="11" font-weight="700" fill="#84cc16" text-anchor="middle">100 KM</text>
    <text x="0" y="11" font-size="9" font-weight="600" fill="#cbd5e1" text-anchor="middle">долговечность</text>
  </g>
</svg>
