    <line x1="218" y1="60" x2="218" y2="100" stroke="#0f172a" stroke-width="1.2"/>
    <text x="226" y="84" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="800" fill="#0f172a">8 мм</text>
    <text x="226" y="98" font-family="DM Sans,sans-serif" font-size="9" font-weight="600" fill="#475569">drop</text>
