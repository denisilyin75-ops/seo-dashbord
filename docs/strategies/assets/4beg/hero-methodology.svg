    <path d="M 22,90 Q 30,76 60,72 L 140,72 Q 170,76 188,90 Q 192,98 170,102 L 32,102 Q 18,98 22,90 Z" fill="url(#brMmidsole)" stroke="#ca8a04" stroke-width="1"/>
