    <polyline points="280,360 340,330 400,340 460,300 520,310 580,260 640,290 700,240 760,260 820,220 880,235 940,210" fill="none" stroke="#84cc16" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#84cc16">
