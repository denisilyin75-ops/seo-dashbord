<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Об авторе 4beg: абстрактный портрет Артёма Спиридонова + замеры пейс-чарта">
  <defs>
    <radialGradient id="brAUspot" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
