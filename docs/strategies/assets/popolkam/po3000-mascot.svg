  <g transform="translate(80 60)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="100" height="30" rx="6" fill="#fff" stroke="#fed7aa" stroke-width="2"/>
    <text x="50" y="14" font-size="9" font-weight="800" fill="#c2410c" text-anchor="middle" letter-spacing="0.5">КОФЕ ГОТОВ</text>
    <text x="50" y="25" font-size="9" font-weight="700" fill="#475569" text-anchor="middle">9 бар · 91°C</text>
    <path d="M 90,30 L 100,40 L 88,38 Z" fill="#fff" stroke="#fed7aa" stroke-width="2"/>
  </g>

  <g transform="translate(180 195)" opacity="0.45">
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#f97316" stroke-width="1.5"/>
    <line x1="-6" y1="-2" x2="-12" y2="-6" stroke="#f97316" stroke-width="1.5"/>
    <line x1="6" y1="-2" x2="12" y2="-6" stroke="#f97316" stroke-width="1.5"/>
  </g>
</svg>
