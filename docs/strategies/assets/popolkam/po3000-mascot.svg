    <ellipse cx="0" cy="0" rx="22" ry="10" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
  </g>
  <g transform="translate(108 215) rotate(70)">
    <rect x="-8" y="0" width="16" height="56" rx="3" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <line x1="-8" y1="20" x2="8" y2="20" stroke="#475569" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="40" x2="8" y2="40" stroke="#475569" stroke-width="1" opacity="0.6"/>
  </g>
  <g transform="translate(60 240)">
    <ellipse cx="0" cy="0" rx="14" ry="14" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#475569"/>
  </g>

  <g transform="translate(240 215)" filter="url(#poShadow)">
    <ellipse cx="0" cy="0" rx="22" ry="10" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
  </g>
  <g transform="translate(252 215) rotate(-70)">
    <rect x="-8" y="0" width="16" height="56" rx="3" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <line x1="-8" y1="20" x2="8" y2="20" stroke="#475569" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="40" x2="8" y2="40" stroke="#475569" stroke-width="1" opacity="0.6"/>
  </g>

  <g transform="translate(308 252)" filter="url(#poShadow)">
    <ellipse cx="0" cy="0" rx="16" ry="14" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <g transform="translate(0 -8)">
      <path d="M -14,4 Q -14,10 -8,12 L 8,12 Q 14,10 14,4 L 12,0 L -12,0 Z" fill="url(#poCup)" stroke="#475569" stroke-width="1"/>
      <ellipse cx="0" cy="-2" rx="11" ry="2" fill="#92400e"/>
      <ellipse cx="0" cy="-3" rx="9" ry="1.5" fill="#fbbf24" fill-opacity="0.6"/>
      <path d="M 12,2 Q 18,2 18,6 Q 18,10 12,10" fill="none" stroke="#475569" stroke-width="1.2"/>
      <g stroke="#f97316" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.8">
        <path d="M -4,-8 Q -2,-14 -4,-20"/>
        <path d="M 0,-8 Q 2,-14 0,-22"/>
        <path d="M 4,-8 Q 6,-14 4,-20"/>
      </g>
    </g>
  </g>

  <g transform="translate(96 270)">
    <rect width="40" height="14" rx="3" fill="#0f172a"/>
    <text x="20" y="10" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#f97316" text-anchor="middle">v3.0</text>
