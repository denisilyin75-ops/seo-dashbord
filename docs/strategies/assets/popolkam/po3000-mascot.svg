    <path d="M 110,360 Q 110,210 180,200 Q 250,210 250,360 L 240,375 L 120,375 Z" fill="url(#poBody)" stroke="#475569" stroke-width="1.5"/>
    <ellipse cx="180" cy="200" rx="70" ry="12" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
    <line x1="118" y1="260" x2="242" y2="260" stroke="#475569" stroke-width="1" opacity="0.6"/>
    <line x1="118" y1="320" x2="242" y2="320" stroke="#475569" stroke-width="1" opacity="0.6"/>
    <g fill="#64748b">
      <circle cx="124" cy="290" r="3"/>
      <circle cx="236" cy="290" r="3"/>
      <circle cx="124" cy="350" r="3"/>
      <circle cx="236" cy="350" r="3"/>
    </g>
  </g>

  <g transform="translate(180 285)">
    <rect x="-46" y="-10" width="92" height="34" rx="6" fill="#0a0e17" stroke="#475569" stroke-width="1.5"/>
    <rect x="-44" y="-8" width="88" height="30" rx="4" fill="#86efac" opacity="0.18"/>
    <text x="0" y="14" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">ПО-3000</text>
    <line x1="-40" y1="20" x2="40" y2="20" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  </g>

  <g transform="translate(140 235)">
