    <path d="M 0,7 L 80,7" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="40" y="12" font-family="DM Sans,sans-serif" font-size="9" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.8">POPOLKAM</text>
  </g>

  <g filter="url(#poShadow)">
    <ellipse cx="180" cy="135" rx="88" ry="78" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <ellipse cx="180" cy="80" rx="76" ry="22" fill="url(#poDome)" stroke="#475569" stroke-width="1.2"/>
    <line x1="180" y1="40" x2="180" y2="20" stroke="#475569" stroke-width="2"/>
    <circle cx="180" cy="16" r="6" fill="#f97316"/>
    <circle cx="180" cy="16" r="6" fill="url(#poEyeGlow)"/>

    <ellipse cx="180" cy="145" rx="64" ry="50" fill="#0a0e17" opacity="0.85"/>

    <ellipse cx="156" cy="135" rx="14" ry="16" fill="url(#poEye)"/>
    <ellipse cx="156" cy="135" rx="14" ry="16" fill="url(#poEyeGlow)" opacity="0.6"/>
    <circle cx="158" cy="132" r="3" fill="#fff" opacity="0.85"/>

    <ellipse cx="204" cy="135" rx="14" ry="16" fill="url(#poEye)"/>
    <ellipse cx="204" cy="135" rx="14" ry="16" fill="url(#poEyeGlow)" opacity="0.6"/>
    <circle cx="206" cy="132" r="3" fill="#fff" opacity="0.85"/>

    <g fill="#fff" opacity="0.9">
      <rect x="160" y="168" width="4" height="6" rx="1"/>
      <rect x="170" y="168" width="4" height="6" rx="1"/>
      <rect x="180" y="168" width="4" height="6" rx="1"/>
      <rect x="190" y="168" width="4" height="6" rx="1"/>
      <rect x="200" y="168" width="4" height="6" rx="1"/>
    </g>

    <ellipse cx="160" cy="100" rx="32" ry="14" fill="#fff" opacity="0.4"/>
  </g>

