<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 460" width="360" height="460" role="img" aria-label="ПО-3000 — ретро-робот-бариста, маскот Popolkam">
  <defs>
    <radialGradient id="poBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff7ed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="poChrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="60%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="poBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="poEye" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="poEyeGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="poDome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="poCup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="poShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="360" height="460" fill="#fafaf9"/>
  <rect width="360" height="460" fill="url(#poBg)"/>

  <ellipse cx="180" cy="420" rx="90" ry="14" fill="#000" fill-opacity="0.16"/>

  <g transform="translate(180 380)">
    <ellipse cx="0" cy="0" rx="74" ry="22" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <ellipse cx="0" cy="-4" rx="74" ry="22" fill="url(#poChrome)" stroke="#475569" stroke-width="1.5"/>
    <ellipse cx="0" cy="-4" rx="56" ry="14" fill="#0f172a" opacity="0.4"/>
    <g fill="#475569">
      <circle cx="-50" cy="-2" r="2.5"/>
      <circle cx="-25" cy="-2" r="2.5"/>
      <circle cx="0" cy="-2" r="2.5"/>
      <circle cx="25" cy="-2" r="2.5"/>
      <circle cx="50" cy="-2" r="2.5"/>
    </g>
  </g>

