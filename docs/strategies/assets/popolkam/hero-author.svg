<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Об авторе Popolkam: абстрактный портрет Дмитрия Полкина на фоне инженерного чертежа эспрессо-машины">
  <defs>
    <radialGradient id="auSpot" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
