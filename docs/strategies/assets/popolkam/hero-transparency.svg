<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Прозрачность партнёрских ссылок Popolkam: rel sponsored атрибут, 4 магазина, цена не меняется">
  <defs>
    <radialGradient id="trSpot" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trCode" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="trBag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="trShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#fafaf9"/>
  <rect width="1200" height="500" fill="url(#trSpot)"/>

  <g fill="#94a3b8" font-family="ui-monospace,Menlo,Consolas,monospace" font-weight="600" opacity="0.18">
    <text x="60" y="60" font-size="42">&lt;/&gt;</text>
    <text x="980" y="80" font-size="34">{ }</text>
    <text x="100" y="430" font-size="28">→ link</text>
    <text x="1020" y="460" font-size="32">&lt;a&gt;</text>
    <text x="540" y="40" font-size="22">rel=</text>
    <text x="40" y="220" font-size="20">↗</text>
    <text x="1130" y="240" font-size="20">↗</text>
  </g>

  <g transform="translate(40 36)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="220" height="36" rx="18" fill="#0f172a"/>
    <text x="20" y="23" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.2">ПРОЗРАЧНОСТЬ</text>
    <circle cx="200" cy="18" r="9" fill="#22c55e"/>
    <path d="M 195,18 L 199,22 L 205,15" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <g transform="translate(280 130)" filter="url(#trShadow)">
    <rect width="640" height="190" rx="14" fill="url(#trCode)"/>
    <rect x="0" y="0" width="640" height="40" rx="14" fill="#0a0e17"/>
    <rect x="0" y="28" width="640" height="14" fill="#0a0e17"/>
    <g transform="translate(16 20)">
      <circle cx="0" cy="0" r="6" fill="#ef4444"/>
      <circle cx="20" cy="0" r="6" fill="#fbbf24"/>
      <circle cx="40" cy="0" r="6" fill="#22c55e"/>
    </g>
    <text x="320" y="25" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">popolkam.ru — обзор кофемашины</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="20" font-weight="500">
      <text x="32" y="84" fill="#94a3b8">&lt;</text>
      <text x="46" y="84" fill="#f87171">a</text>
      <text x="68" y="84" fill="#cbd5e1">href=</text>
      <text x="135" y="84" fill="#86efac">&quot;...&quot;</text>
      <text x="200" y="84" fill="#94a3b8">&gt;</text>
      <text x="64" y="116" fill="#fbbf24" font-weight="700">rel</text>
      <text x="100" y="116" fill="#cbd5e1">=</text>
      <text x="116" y="116" fill="#fb923c" font-weight="700">&quot;sponsored&quot;</text>
      <line x1="116" y1="124" x2="246" y2="124" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
      <text x="64" y="148" fill="#94a3b8">target=</text>
      <text x="160" y="148" fill="#86efac">&quot;_blank&quot;</text>
      <text x="32" y="174" fill="#94a3b8">  Цена на Маркете →</text>
    </g>
    <g transform="translate(560 50)">
      <rect width="60" height="22" rx="11" fill="#f97316"/>
      <text x="30" y="15" font-family="DM Sans,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">SEO ✓</text>
    </g>
  </g>

  <g transform="translate(60 250)" filter="url(#trShadow)">
    <ellipse cx="60" cy="116" rx="56" ry="7" fill="#000" fill-opacity="0.16"/>
    <path d="M -2,108 Q -2,116 8,118 L 112,118 Q 122,116 122,108 L 119,102 L 1,102 Z" fill="#fff"/>
    <ellipse cx="60" cy="102" rx="58" ry="6" fill="#e5e7eb"/>
    <path d="M 22,30 Q 22,18 30,16 L 90,16 Q 98,18 98,30 L 96,84 Q 94,94 86,98 Q 60,104 34,98 Q 26,94 24,84 Z" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <ellipse cx="60" cy="20" rx="36" ry="6" fill="#92400e"/>
    <ellipse cx="60" cy="19" rx="30" ry="3.5" fill="#fbbf24" fill-opacity="0.6"/>
    <path d="M 96,40 Q 118,40 120,58 Q 120,74 100,76 L 100,70 Q 114,69 115,58 Q 114,47 96,47 Z" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="60" y="146" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#475569" text-anchor="middle">ВЫ</text>
  </g>

  <g stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round">
    <path d="M 200,310 Q 280,260 340,225"/>
  </g>
  <g transform="translate(220 282)">
    <circle cx="0" cy="0" r="14" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <text x="0" y="4" font-family="DM Sans,sans-serif" font-size="11" font-weight="800" fill="#f97316" text-anchor="middle">→</text>
  </g>

  <g stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round">
    <path d="M 920,225 Q 990,260 1040,310"/>
  </g>

  <g transform="translate(900 350)">
    <g transform="translate(0 0)">
      <rect width="80" height="100" rx="6" fill="url(#trBag)" stroke="#cbd5e1" stroke-width="1.5"/>
      <path d="M 22,8 Q 22,-12 40,-12 Q 58,-12 58,8" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="58" font-family="DM Sans,sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">М</text>
      <text x="40" y="78" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">МАРКЕТ</text>
    </g>
    <g transform="translate(96 0)">
      <rect width="80" height="100" rx="6" fill="url(#trBag)" stroke="#cbd5e1" stroke-width="1.5"/>
      <path d="M 22,8 Q 22,-12 40,-12 Q 58,-12 58,8" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="58" font-family="DM Sans,sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">О</text>
      <text x="40" y="78" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">ОЗОН</text>
    </g>
    <g transform="translate(192 0)">
      <rect width="80" height="100" rx="6" fill="url(#trBag)" stroke="#cbd5e1" stroke-width="1.5"/>
      <path d="M 22,8 Q 22,-12 40,-12 Q 58,-12 58,8" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="58" font-family="DM Sans,sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">W</text>
      <text x="40" y="78" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle">WB</text>
    </g>
  </g>

  <g transform="translate(880 460)">
    <rect width="280" height="32" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="140" y="20" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#c2410c" text-anchor="middle">Магазин платит нам 1-3% — цена та же</text>
  </g>

  <g transform="translate(60 460)">
    <rect width="200" height="32" rx="16" fill="#0f172a"/>
    <text x="100" y="20" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Каждая ссылка с rel=&quot;sponsored&quot;</text>
  </g>
</svg>
