      <line x1="136" y1="80" x2="128" y2="80"/>
      <line x1="70" y1="146" x2="70" y2="138"/>
      <line x1="4" y1="80" x2="12" y2="80"/>
    </g>
    <g stroke="#94a3b8" stroke-width="1">
