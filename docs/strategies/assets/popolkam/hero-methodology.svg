      <text x="46" y="44">100</text>
      <line x1="36" y1="80" x2="42" y2="80" stroke="#f97316" stroke-width="1.5"/>
      <text x="46" y="84" fill="#f97316" font-weight="700">91°C</text>
      <line x1="36" y1="120" x2="42" y2="120" stroke="#475569" stroke-width="1"/>
      <text x="46" y="124">75</text>
      <line x1="36" y1="160" x2="42" y2="160" stroke="#475569" stroke-width="1"/>
      <text x="46" y="164">50</text>
