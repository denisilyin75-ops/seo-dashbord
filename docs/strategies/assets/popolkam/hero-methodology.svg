<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Лабораторный стенд Popolkam: ваттметр, эспрессо-чашка, dB-meter, секундомер, термометр">
  <defs>
    <radialGradient id="methSpot" cx="50%" cy="44%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="methCremа" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="60%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="methCupBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="methSteam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="methDevice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="methThermoMercury" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <pattern id="methGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#cbd5e1" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <filter id="methShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="6" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#fafaf9"/>
  <rect width="1200" height="500" fill="url(#methSpot)"/>

  <g transform="rotate(-2 600 250)">
    <rect x="240" y="100" width="720" height="320" fill="#fff" filter="url(#methShadow)"/>
    <rect x="240" y="100" width="720" height="320" fill="url(#methGrid)"/>
    <polyline points="280,360 340,310 400,330 460,260 520,290 580,200 640,250 700,180 760,220 820,160 880,190 940,140" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#f97316">
      <circle cx="280" cy="360" r="3"/>
      <circle cx="400" cy="330" r="3"/>
      <circle cx="520" cy="290" r="3"/>
      <circle cx="640" cy="250" r="3"/>
      <circle cx="760" cy="220" r="3"/>
      <circle cx="880" cy="190" r="3"/>
    </g>
  </g>

