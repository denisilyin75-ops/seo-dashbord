    <path d="M 624,445 Q 630,440 636,445 Q 630,450 624,445 Z" fill="#1c1917" transform="rotate(8 630 445)"/>
    <ellipse cx="850" cy="455" rx="12" ry="7" fill="#3a2415" transform="rotate(-22 850 455)"/>
    <path d="M 844,455 Q 850,450 856,455 Q 850,460 844,455 Z" fill="#1c1917" transform="rotate(-22 850 455)"/>
