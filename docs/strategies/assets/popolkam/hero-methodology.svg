    <rect x="22" y="146" width="76" height="14" rx="3" fill="#0f172a"/>
    <text x="60" y="157" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#94a3b8" text-anchor="middle">SOUND METER</text>
