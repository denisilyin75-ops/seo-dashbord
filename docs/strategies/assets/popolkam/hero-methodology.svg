  <g transform="translate(40 60)" font-family="DM Sans,system-ui,sans-serif">
    <rect width="190" height="36" rx="18" fill="#0f172a"/>
    <text x="20" y="23" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.2">МЕТОДОЛОГИЯ</text>
