    <circle cx="56" cy="86" r="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <rect x="78" y="80" width="68" height="14" rx="2" fill="#0a0e17"/>
    <text x="112" y="91" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="#cbd5e1" text-anchor="middle">POWER METER</text>
    <path d="M 14,90 Q -20,120 -40,160 Q -60,200 -20,210" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <rect x="-50" y="200" width="20" height="24" rx="2" fill="#0f172a"/>
    <rect x="-46" y="208" width="3" height="12" fill="#fbbf24"/>
    <rect x="-39" y="208" width="3" height="12" fill="#fbbf24"/>
