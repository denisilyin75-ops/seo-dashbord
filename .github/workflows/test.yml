name: Tests

on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check syntax — all server files
        run: |
          find server -name '*.js' -not -path 'node_modules/*' -exec node --check {} \;

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate api-reference + architecture
        run: node server/scripts/code-review-nightly.js || true

      - name: Security audit + smells (informational)
        run: |
          node -e "
            import('./server/services/code-review/security-audit.js').then(m => {
              const r = m.runSecurityAudit('.');
              console.log('Security:', JSON.stringify(r.counts));
            });
          " || true
