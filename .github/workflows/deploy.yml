name: Deploy to production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'prototype/**'
      - 'n8n/**'
  workflow_dispatch:
    inputs:
      skip_build_check:
        description: 'Skip build check (emergency deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  DEPLOY_PATH: /opt/scc

jobs:
  # ---------- 1. Проверка что код собирается ----------
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_build_check }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: test -f dist/index.html && echo "Build OK"

  # ---------- 2. Deploy через SSH ----------
  deploy:
    name: Deploy via SSH
    needs: [build-check]
    if: ${{ always() && (needs.build-check.result == 'success' || inputs.skip_build_check) }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cmd.bonaka.app
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 5.129.245.98
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            DEPLOY_PATH=/opt/scc

            echo "=== Pull latest code ==="
            if [ -d "$DEPLOY_PATH/.git" ]; then
              cd $DEPLOY_PATH
              git fetch origin main
              git reset --hard origin/main
            else
              mkdir -p $DEPLOY_PATH
              git clone --branch main https://github.com/denisilyin75-ops/seo-dashbord.git $DEPLOY_PATH
              cd $DEPLOY_PATH
            fi

            echo "=== Rebuild container ==="
            docker compose up -d --build --remove-orphans

            echo "=== Wait for healthy ==="
            for i in $(seq 1 20); do
              STATUS=$(docker inspect scc --format '{{.State.Health.Status}}' 2>/dev/null || echo "missing")
              echo "  attempt $i: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "=== Health check ==="
                docker exec scc node -e "fetch('http://127.0.0.1:3001/api/health').then(r=>r.text()).then(t=>{console.log(t);process.exit(0)}).catch(()=>process.exit(1))"
                echo "=== Deploy OK ==="
                exit 0
              fi
              sleep 5
            done
            echo "FAILED: container not healthy after 100s"
            docker logs scc --tail 30
            exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://cmd.bonaka.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
